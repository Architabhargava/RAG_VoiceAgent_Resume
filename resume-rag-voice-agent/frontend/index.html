<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background-color: #007bff; color: white; margin-top: 1rem; transition: all 0.2s ease; }
        button:focus-visible { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #007bff; outline: none; }
        button:active { transform: scale(0.98); }
        button.recording { background-color: #dc3545; }
        #status { margin-top: 1rem; color: #555; min-height: 1.5em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Press and hold <strong>Space</strong> or the button to speak.</p>
        <button id="recordBtn" aria-pressed="false">Push to Talk</button>
        <div id="status" aria-live="polite">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>
    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let mediaRecorder, audioChunks = [], socket, isRecordingIntent = false;

        function initWebSocket() {
            socket = new WebSocket('ws://localhost:8000/voice');
            socket.binaryType = 'arraybuffer';
            socket.onopen = () => status.textContent = 'Connected to server';
            socket.onclose = () => { status.textContent = 'Disconnected. Retrying...'; setTimeout(initWebSocket, 2000); };
            socket.onmessage = (event) => {
                const url = URL.createObjectURL(new Blob([event.data], { type: 'audio/mp3' }));
                audioPlayer.src = url; audioPlayer.style.display = 'block'; audioPlayer.play();
                status.textContent = 'Playing response...';
            };
        }
        initWebSocket();

        async function start() {
            if (isRecordingIntent) return;
            isRecordingIntent = true;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                if (!isRecordingIntent) return stream.getTracks().forEach(t => t.stop());
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    socket.send(new Blob(audioChunks, { type: 'audio/wav' }));
                    status.textContent = 'Sent audio, waiting...';
                };
                audioChunks = []; mediaRecorder.start();
                recordBtn.textContent = 'Release to Send'; recordBtn.classList.add('recording');
                recordBtn.setAttribute('aria-pressed', 'true'); status.textContent = 'Recording...';
            } catch (e) { isRecordingIntent = false; status.textContent = 'Mic Error'; }
        }

        function stop() {
            if (!isRecordingIntent) return;
            isRecordingIntent = false;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            recordBtn.textContent = 'Push to Talk'; recordBtn.classList.remove('recording');
            recordBtn.setAttribute('aria-pressed', 'false');
        }

        recordBtn.onmousedown = start;
        window.onmouseup = stop;
        window.onkeydown = (e) => { if (e.code === 'Space' && !e.repeat) { e.preventDefault(); start(); } };
        window.onkeyup = (e) => { if (e.code === 'Space') stop(); };
    </script>
</body>
</html>
