<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background-color: #007bff; color: white; margin-top: 1rem; transition: background-color 0.2s, transform 0.1s; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #ccc; }
        #status { margin-top: 1rem; color: #555; min-height: 1.5em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Click and hold to speak, release to send.</p>
        <button id="recordBtn">Push to Talk</button>
        <div id="status">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let mediaRecorder;
        let audioChunks = [];
        let socket;
        let isRecordingIntent = false;

        function initWebSocket() {
            const host = window.location.host || 'localhost:8000';
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            socket = new WebSocket(`${protocol}//${host}/voice`);
            socket.binaryType = 'arraybuffer';
            socket.onopen = () => status.textContent = 'Connected to server';
            socket.onclose = () => {
                status.textContent = 'Disconnected. Retrying...';
                setTimeout(initWebSocket, 2000);
            };
            socket.onmessage = (event) => {
                if (audioPlayer.src) URL.revokeObjectURL(audioPlayer.src);
                audioPlayer.src = URL.createObjectURL(new Blob([event.data], { type: 'audio/mp3' }));
                audioPlayer.style.display = 'block';
                audioPlayer.play().catch(() => {});
                status.textContent = 'Playing response...';
            };
        }
        initWebSocket();

        async function startRecording() {
            isRecordingIntent = true;
            audioChunks = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                if (!isRecordingIntent) return stream.getTracks().forEach(t => t.stop());
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    if (socket.readyState === 1) socket.send(new Blob(audioChunks));
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                status.textContent = 'Recording...';
                recordBtn.style.backgroundColor = '#dc3545';
            } catch (e) { status.textContent = 'Error: ' + e.message; isRecordingIntent = false; }
        }

        function stopRecording() {
            isRecordingIntent = false;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                status.textContent = 'Processing...';
            }
            recordBtn.style.backgroundColor = '#007bff';
        }

        recordBtn.onmousedown = startRecording;
        window.addEventListener('mouseup', stopRecording);
        recordBtn.ontouchstart = (e) => { e.preventDefault(); startRecording(); };
        recordBtn.ontouchend = (e) => { e.preventDefault(); stopRecording(); };
        window.onkeydown = (e) => { if (e.code === 'Space' && !e.repeat) { e.preventDefault(); startRecording(); } };
        window.onkeyup = (e) => { if (e.code === 'Space') { e.preventDefault(); stopRecording(); } };
    </script>
</body>
</html>
