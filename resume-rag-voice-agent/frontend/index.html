<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
            margin-top: 1rem;
            transition: all 0.2s ease;
            outline: none;
        }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        button:focus-visible {
            box-shadow: 0 0 0 2px white, 0 0 0 4px #007bff;
        }
        button:active {
            transform: scale(0.98);
        }
        #recordBtn.recording {
            background-color: #dc3545;
        }
        #recordBtn.recording:focus-visible {
            box-shadow: 0 0 0 2px white, 0 0 0 4px #dc3545;
        }
        #status {
            margin-top: 1rem;
            color: #555;
            min-height: 1.5em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Click and hold to speak, release to send.</p>
        <button id="recordBtn">Push to Talk</button>
        <div id="status">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let mediaRecorder;
        let audioChunks = [];
        let socket;
        let isRecordingIntent = false;

        // Initialize WebSocket
        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.host || 'localhost:8000';
            socket = new WebSocket(`${protocol}//${host}/voice`);
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => status.textContent = 'Connected to server';
            socket.onclose = () => {
                status.textContent = 'Disconnected. Retrying...';
                setTimeout(initWebSocket, 2000);
            };

            socket.onmessage = (event) => {
                if (audioPlayer.src) URL.revokeObjectURL(audioPlayer.src);
                const blob = new Blob([event.data], { type: 'audio/mp3' });
                const url = URL.createObjectURL(blob);
                audioPlayer.src = url;
                audioPlayer.style.display = 'block';
                audioPlayer.play();
                status.textContent = 'Playing response...';
            };
        }

        initWebSocket();

        async function startRecording() {
            if (isRecordingIntent) return;
            isRecordingIntent = true;
            audioChunks = [];

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                if (!isRecordingIntent) {
                    stream.getTracks().forEach(track => track.stop());
                    return;
                }

                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    stream.getTracks().forEach(track => track.stop());
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioBlob.arrayBuffer().then(buffer => {
                        if (socket.readyState === WebSocket.OPEN) {
                            socket.send(buffer);
                            status.textContent = 'Sent audio, waiting for response...';
                        }
                    });
                };

                mediaRecorder.start();
                status.textContent = 'Recording...';
                recordBtn.classList.add('recording');
                recordBtn.textContent = 'Release to Send';
                recordBtn.setAttribute('aria-pressed', 'true');
            } catch (err) {
                console.error('Error accessing microphone:', err);
                status.textContent = 'Error: Could not access microphone';
                isRecordingIntent = false;
            }
        }

        function stopRecording() {
            if (!isRecordingIntent) return;
            isRecordingIntent = false;

            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                status.textContent = 'Processing audio...';
            }

            recordBtn.classList.remove('recording');
            recordBtn.textContent = 'Push to Talk';
            recordBtn.setAttribute('aria-pressed', 'false');
        }

        recordBtn.onpointerdown = (e) => {
            e.preventDefault();
            startRecording();
        };

        window.addEventListener('pointerup', stopRecording);

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.repeat) {
                const target = e.target;
                const isInput = target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable;
                if (!isInput) {
                    e.preventDefault();
                    startRecording();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                stopRecording();
            }
        });
    </script>
</body>
</html>
