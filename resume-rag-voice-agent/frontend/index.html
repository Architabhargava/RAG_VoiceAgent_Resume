<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background-color: #007bff; color: white; margin-top: 1rem; transition: all 0.2s ease; }
        button:disabled { background-color: #ccc; }
        #recordBtn.recording { background-color: #dc3545; }
        #status { margin-top: 1rem; color: #555; min-height: 1.5em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Click and hold to speak, release to send.</p>
        <button id="recordBtn" aria-pressed="false">Push to Talk</button>
        <div id="status" aria-live="polite">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let mediaRecorder;
        let audioChunks = [];
        let socket;
        let isRecording = false;
        let currentAudioUrl = null;

        // Initialize WebSocket
        function initWebSocket() {
            socket = new WebSocket('ws://localhost:8000/voice');
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => status.innerText = 'Connected to server';
            socket.onclose = () => {
                status.innerText = 'Disconnected. Retrying...';
                setTimeout(initWebSocket, 2000);
            };

            socket.onmessage = (event) => {
                const blob = new Blob([event.data], { type: 'audio/mp3' });
                if (currentAudioUrl) {
                    URL.revokeObjectURL(currentAudioUrl);
                }
                currentAudioUrl = URL.createObjectURL(blob);
                audioPlayer.src = currentAudioUrl;
                audioPlayer.style.display = 'block';
                audioPlayer.play();
                status.innerText = 'Playing response...';
            };
        }

        initWebSocket();

        // Recording logic
        async function startRecording() {
            if (isRecording) return;
            isRecording = true;

            audioChunks = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                // Re-verify isRecording in case it was cancelled during permission prompt
                if (!isRecording) {
                    stream.getTracks().forEach(track => track.stop());
                    return;
                }

                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioBlob.arrayBuffer().then(buffer => {
                        if (socket && socket.readyState === WebSocket.OPEN) {
                            socket.send(buffer);
                            status.textContent = 'Sent audio, waiting for response...';
                        }
                    });
                    // Stop all tracks to release microphone
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                status.textContent = 'Recording...';
                recordBtn.classList.add('recording');
                recordBtn.setAttribute('aria-pressed', 'true');
                recordBtn.textContent = 'Release to Send';
            } catch (err) {
                console.error("Error accessing microphone:", err);
                status.textContent = 'Error: Could not access microphone';
                isRecording = false;
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;

            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }

            recordBtn.classList.remove('recording');
            recordBtn.setAttribute('aria-pressed', 'false');
            recordBtn.textContent = 'Push to Talk';
        }

        recordBtn.addEventListener('mousedown', startRecording);
        recordBtn.addEventListener('mouseup', stopRecording);
        recordBtn.addEventListener('mouseleave', stopRecording);

        // Touch support
        recordBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startRecording();
        });
        recordBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopRecording();
        });

        // Keyboard support (Space key)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isRecording) {
                // Prevent scrolling when pressing space
                if (['INPUT', 'TEXTAREA'].includes(e.target.tagName) || e.target.isContentEditable) return;
                e.preventDefault();
                startRecording();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && isRecording) {
                e.preventDefault();
                stopRecording();
            }
        });
    </script>
</body>
</html>
