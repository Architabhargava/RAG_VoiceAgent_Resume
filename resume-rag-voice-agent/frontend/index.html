<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background-color: #007bff; color: white; margin-top: 1rem; transition: background-color 0.2s, outline 0.2s; }
        button:disabled { background-color: #ccc; }
        button:focus-visible { outline: 3px solid #0056b3; outline-offset: 2px; }
        #recordBtn.recording { background-color: #dc3545; }
        #status { margin-top: 1rem; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Click and hold to speak, release to send.</p>
        <button id="recordBtn" aria-label="Push to Talk" aria-pressed="false">Push to Talk</button>
        <div id="status" aria-live="polite">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let mediaRecorder;
        let audioChunks = [];
        let socket;

        // Initialize WebSocket
        function initWebSocket() {
            socket = new WebSocket('ws://localhost:8000/voice');
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => status.innerText = 'Connected to server';
            socket.onclose = () => {
                status.innerText = 'Disconnected. Retrying...';
                setTimeout(initWebSocket, 2000);
            };

            socket.onmessage = (event) => {
                const blob = new Blob([event.data], { type: 'audio/mp3' });
                const url = URL.createObjectURL(blob);
                audioPlayer.src = url;
                audioPlayer.style.display = 'block';
                audioPlayer.play();
                status.innerText = 'Playing response...';
            };
        }

        initWebSocket();

        let isRecording = false;
        let mediaStream = null;

        async function startRecording() {
            if (isRecording) return;
            isRecording = true;
            audioChunks = [];

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // Check if user cancelled while waiting for permission
                if (!isRecording) {
                    mediaStream.getTracks().forEach(track => track.stop());
                    return;
                }

                mediaRecorder = new MediaRecorder(mediaStream);
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioBlob.arrayBuffer().then(buffer => {
                        if (socket && socket.readyState === WebSocket.OPEN) {
                            socket.send(buffer);
                            status.innerText = 'Sent audio, waiting for response...';
                        }
                    });

                    if (mediaStream) {
                        mediaStream.getTracks().forEach(track => track.stop());
                        mediaStream = null;
                    }
                };

                mediaRecorder.start();
                status.innerText = 'Recording...';
                recordBtn.innerText = 'Release to Send';
                recordBtn.classList.add('recording');
                recordBtn.setAttribute('aria-pressed', 'true');
                recordBtn.setAttribute('aria-label', 'Stop Recording');
            } catch (err) {
                console.error('Error accessing microphone:', err);
                status.innerText = 'Error: Could not access microphone';
                isRecording = false;
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            recordBtn.innerText = 'Push to Talk';
            recordBtn.classList.remove('recording');
            recordBtn.setAttribute('aria-pressed', 'false');
            recordBtn.setAttribute('aria-label', 'Push to Talk');
        }

        // Event Listeners
        recordBtn.addEventListener('mousedown', (e) => {
            if (e.button === 0) startRecording();
        });

        window.addEventListener('mouseup', () => {
            if (isRecording) stopRecording();
        });

        recordBtn.addEventListener('mouseleave', () => {
            if (isRecording) stopRecording();
        });

        // Keyboard Support (Space bar)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isRecording) {
                const target = e.target;
                if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA' && !target.isContentEditable) {
                    e.preventDefault();
                    startRecording();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && isRecording) {
                e.preventDefault();
                stopRecording();
            }
        });
    </script>
</body>
</html>
