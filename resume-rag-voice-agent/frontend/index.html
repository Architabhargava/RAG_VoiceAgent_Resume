<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background-color: #007bff; color: white; margin-top: 1rem; transition: all 0.2s ease; outline: none; }
        button:hover { background-color: #0056b3; }
        button:active { transform: scale(0.98); }
        button:focus-visible { outline: 2px solid transparent; box-shadow: 0 0 0 2px #fff, 0 0 0 4px #007bff; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #recordBtn.recording { background-color: #dc3545; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }
        #status { margin-top: 1rem; color: #555; min-height: 1.5em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Click and hold <strong>Space</strong> or use the button to speak.</p>
        <button id="recordBtn" aria-pressed="false">Push to Talk</button>
        <div id="status">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let mediaRecorder;
        let audioChunks = [];
        let socket;

        // Initialize WebSocket
        function initWebSocket() {
            socket = new WebSocket('ws://localhost:8000/voice');
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => status.innerText = 'Connected to server';
            socket.onclose = () => {
                status.innerText = 'Disconnected. Retrying...';
                setTimeout(initWebSocket, 2000);
            };

            socket.onmessage = (event) => {
                const blob = new Blob([event.data], { type: 'audio/mp3' });
                const url = URL.createObjectURL(blob);
                audioPlayer.src = url;
                audioPlayer.style.display = 'block';
                audioPlayer.play();
                status.innerText = 'Playing response...';
            };
        }

        initWebSocket();

        // Recording logic
        let isRecording = false;

        async function startRecording() {
            if (isRecording) return;
            isRecording = true;
            audioChunks = [];

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioBlob.arrayBuffer().then(buffer => {
                        socket.send(buffer);
                        status.textContent = 'Sent audio, waiting for response...';
                    });
                };

                mediaRecorder.start();
                status.textContent = 'Recording...';
                recordBtn.textContent = 'Release to Send';
                recordBtn.classList.add('recording');
                recordBtn.setAttribute('aria-pressed', 'true');
            } catch (err) {
                console.error("Error accessing microphone:", err);
                status.textContent = 'Error: Could not access microphone';
                isRecording = false;
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            recordBtn.textContent = 'Push to Talk';
            recordBtn.classList.remove('recording');
            recordBtn.setAttribute('aria-pressed', 'false');
        }

        recordBtn.onmousedown = startRecording;
        recordBtn.onmouseup = stopRecording;
        recordBtn.onmouseleave = stopRecording; // Ensure it stops if mouse leaves button

        // Keyboard support
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isRecording && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault();
                startRecording();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && isRecording) {
                e.preventDefault();
                stopRecording();
            }
        });
    </script>
</body>
</html>
