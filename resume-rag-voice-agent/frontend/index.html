<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background-color: #007bff; color: white; margin-top: 1rem; transition: background-color 0.2s; }
        button:focus-visible { outline: 3px solid rgba(0,123,255,0.5); outline-offset: 2px; }
        #recordBtn.recording { background-color: #dc3545; }
        button:disabled { background-color: #ccc; }
        #status { margin-top: 1rem; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Click and hold to speak, release to send.</p>
        <button id="recordBtn" aria-label="Push to Talk" aria-pressed="false">Push to Talk</button>
        <div id="status" aria-live="polite">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let mediaRecorder, mediaStream, audioChunks = [], socket, currentAudioUrl, isRecording = false;

        function initWebSocket() {
            socket = new WebSocket('ws://localhost:8000/voice');
            socket.binaryType = 'arraybuffer';
            socket.onopen = () => status.innerText = 'Connected to server';
            socket.onclose = () => { status.innerText = 'Disconnected. Retrying...'; setTimeout(initWebSocket, 2000); };
            socket.onmessage = (event) => {
                if (currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
                currentAudioUrl = URL.createObjectURL(new Blob([event.data], { type: 'audio/mp3' }));
                audioPlayer.src = currentAudioUrl; audioPlayer.style.display = 'block'; audioPlayer.play();
                status.innerText = 'Playing response...';
            };
        }
        initWebSocket();

        async function startRecording() {
            if (isRecording) return;
            isRecording = true;
            try {
                audioChunks = [];
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                if (!isRecording) return stream.getTracks().forEach(t => t.stop());
                mediaStream = stream;
                mediaRecorder = new MediaRecorder(mediaStream);
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    socket.send(new Blob(audioChunks, { type: 'audio/wav' }));
                    status.innerText = 'Sent audio, waiting for response...';
                };
                mediaRecorder.start();
                status.innerText = 'Recording...';
                recordBtn.innerText = 'Release to Send';
                recordBtn.classList.add('recording');
                recordBtn.setAttribute('aria-pressed', 'true');
            } catch (err) {
                isRecording = false;
                status.innerText = 'Error: ' + err.message;
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
            status.innerText = 'Processing...';
            recordBtn.innerText = 'Push to Talk';
            recordBtn.classList.remove('recording');
            recordBtn.setAttribute('aria-pressed', 'false');
        }

        recordBtn.addEventListener('mousedown', startRecording);
        window.addEventListener('mouseup', stopRecording);
        recordBtn.addEventListener('mouseleave', stopRecording);
        recordBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); }, {passive: false});
        recordBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); }, {passive: false});
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.repeat && !['INPUT', 'TEXTAREA'].includes(e.target.tagName) && !e.target.isContentEditable) {
                e.preventDefault(); startRecording();
            }
        });
        window.addEventListener('keyup', (e) => { if (e.code === 'Space') stopRecording(); });
    </script>
</body>
</html>
