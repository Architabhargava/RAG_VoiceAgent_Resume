<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background-color: #007bff; color: white; margin-top: 1rem; transition: all 0.2s ease; outline: none; }
        button:hover { background-color: #0056b3; }
        button:active { transform: scale(0.98); }
        button:focus-visible { box-shadow: 0 0 0 2px white, 0 0 0 4px #007bff; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #recordBtn.recording { background-color: #dc3545; }
        #recordBtn.recording:hover { background-color: #a71d2a; }
        #status { margin-top: 1rem; color: #555; min-height: 1.5em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Click and hold to speak, release to send.</p>
        <button id="recordBtn" aria-pressed="false">Push to Talk</button>
        <div id="status" aria-live="polite">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let mediaRecorder;
        let audioChunks = [];
        let socket;

        // Initialize WebSocket
        function initWebSocket() {
            socket = new WebSocket('ws://localhost:8000/voice');
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => status.textContent = 'Connected to server';
            socket.onclose = () => {
                status.textContent = 'Disconnected. Retrying...';
                setTimeout(initWebSocket, 2000);
            };

            socket.onmessage = (event) => {
                const blob = new Blob([event.data], { type: 'audio/mp3' });
                const url = URL.createObjectURL(blob);
                audioPlayer.src = url;
                audioPlayer.style.display = 'block';
                audioPlayer.play();
                status.textContent = 'Playing response...';
            };
        }

        initWebSocket();

        let isRecording = false;

        async function startRecording() {
            if (isRecording) return;
            isRecording = true;
            audioChunks = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioBlob.arrayBuffer().then(buffer => {
                        socket.send(buffer);
                        status.textContent = 'Sent audio, waiting for response...';
                    });
                };

                mediaRecorder.start();
                status.textContent = 'Recording...';
                recordBtn.textContent = 'Release to Send';
                recordBtn.classList.add('recording');
                recordBtn.setAttribute('aria-pressed', 'true');
            } catch (err) {
                console.error("Error accessing microphone:", err);
                status.textContent = 'Error accessing microphone';
                isRecording = false;
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            recordBtn.textContent = 'Push to Talk';
            recordBtn.classList.remove('recording');
            recordBtn.setAttribute('aria-pressed', 'false');
            status.textContent = 'Processing audio...';
        }

        // Recording logic
        recordBtn.onmousedown = startRecording;
        recordBtn.onmouseup = stopRecording;
        recordBtn.onmouseleave = stopRecording; // Handle mouse leaving button while pressed

        // Touch support
        recordBtn.ontouchstart = (e) => { e.preventDefault(); startRecording(); };
        recordBtn.ontouchend = (e) => { e.preventDefault(); stopRecording(); };

        // Keyboard support
        window.onkeydown = (e) => {
            if (e.code === 'Space' && !isRecording && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault();
                startRecording();
            }
        };
        window.onkeyup = (e) => {
            if (e.code === 'Space' && isRecording) {
                e.preventDefault();
                stopRecording();
            }
        };
    </script>
</body>
</html>
