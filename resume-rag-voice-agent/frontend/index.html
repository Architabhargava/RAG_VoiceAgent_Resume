<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background-color: #007bff; color: white; margin-top: 1rem; transition: all 0.2s ease; outline: none; }
        button:hover { background-color: #0056b3; transform: scale(1.02); }
        button:active { transform: scale(0.98); }
        button:focus-visible { box-shadow: 0 0 0 2px white, 0 0 0 4px #007bff; }
        button.recording { background-color: #dc3545; }
        button.recording:hover { background-color: #c82333; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { margin-top: 1rem; color: #555; min-height: 1.5em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Click and hold to speak, release to send.</p>
        <button id="recordBtn">Push to Talk</button>
        <div id="status">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let mediaRecorder;
        let audioChunks = [];
        let socket;
        let isRecording = false;

        // Initialize WebSocket
        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            // Fallback to localhost:8000 if host is empty (e.g. file:// protocol)
            const host = window.location.host || 'localhost:8000';

            // If the host doesn't already have a port and is not localhost,
            // you might want to default to 8000 for dev, but let's stick to a safer approach:
            // if we're on a dev server (like :5173), we still need to point to :8000 for the backend.
            const socketUrl = (host.includes(':') && !host.includes('8000'))
                ? `${protocol}//${host.split(':')[0]}:8000/voice`
                : `${protocol}//${host}/voice`;

            socket = new WebSocket(socketUrl);
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => status.textContent = 'Connected to server';
            socket.onclose = () => {
                status.textContent = 'Disconnected. Retrying...';
                setTimeout(initWebSocket, 2000);
            };

            socket.onmessage = (event) => {
                const blob = new Blob([event.data], { type: 'audio/mp3' });
                if (audioPlayer.src) URL.revokeObjectURL(audioPlayer.src);
                const url = URL.createObjectURL(blob);
                audioPlayer.src = url;
                audioPlayer.style.display = 'block';
                audioPlayer.play();
                status.textContent = 'Playing response...';
            };
        }

        initWebSocket();

        async function startRecording() {
            if (isRecording) return;
            isRecording = true;
            audioChunks = [];

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                if (!isRecording) {
                    stream.getTracks().forEach(track => track.stop());
                    return;
                }

                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        audioBlob.arrayBuffer().then(buffer => {
                            if (socket && socket.readyState === WebSocket.OPEN) {
                                socket.send(buffer);
                                status.textContent = 'Processing audio...';
                            }
                        });
                    }
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                status.textContent = 'Recording...';
                recordBtn.classList.add('recording');
                recordBtn.textContent = 'Release to Send';
                recordBtn.setAttribute('aria-pressed', 'true');
            } catch (err) {
                console.error('Error accessing microphone:', err);
                status.textContent = 'Microphone access denied';
                isRecording = false;
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;

            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }

            recordBtn.classList.remove('recording');
            recordBtn.textContent = 'Push to Talk';
            recordBtn.setAttribute('aria-pressed', 'false');
        }

        recordBtn.onmousedown = (e) => { e.preventDefault(); startRecording(); };
        window.addEventListener('mouseup', stopRecording);

        // Touch support
        recordBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); }, { passive: false });
        window.addEventListener('touchend', stopRecording);

        // Keyboard support (Space bar)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.repeat) {
                const target = e.target;
                if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA' && !target.isContentEditable) {
                    e.preventDefault();
                    startRecording();
                }
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                stopRecording();
            }
        });
    </script>
</body>
</html>
