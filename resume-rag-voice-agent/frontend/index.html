<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background-color: #007bff; color: white; margin-top: 1rem; transition: all 0.2s; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        button:focus-visible { outline: 3px solid #0056b3; outline-offset: 2px; }
        #recordBtn.recording { background-color: #dc3545; box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }
        #status { margin-top: 1rem; color: #555; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Click and hold to speak, release to send.</p>
        <button id="recordBtn" aria-pressed="false">Push to Talk</button>
        <div id="status" aria-live="polite">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const btn = document.getElementById('recordBtn'), status = document.getElementById('status'), audio = document.getElementById('audioPlayer');
        let mediaRecorder, chunks = [], socket, isRecording = false;

        function initWS() {
            socket = new WebSocket('ws://localhost:8000/voice');
            socket.binaryType = 'arraybuffer';
            socket.onopen = () => status.innerText = 'Connected';
            socket.onclose = () => { status.innerText = 'Retrying...'; setTimeout(initWS, 2000); };
            socket.onmessage = (e) => {
                if (audio.src) URL.revokeObjectURL(audio.src);
                audio.src = URL.createObjectURL(new Blob([e.data], { type: 'audio/mp3' }));
                audio.style.display = 'block';
                audio.play();
                status.innerText = 'Playing...';
            };
        }
        initWS();

        async function start() {
            if (isRecording) return;
            isRecording = true; chunks = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                if (!isRecording) return stream.getTracks().forEach(t => t.stop());
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/wav' });
                    blob.arrayBuffer().then(buf => socket?.readyState === 1 && socket.send(buf));
                    status.innerText = 'Sent, waiting...';
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                status.innerText = 'Recording...';
                btn.classList.add('recording');
                btn.innerText = 'Release to Send';
                btn.setAttribute('aria-pressed', 'true');
            } catch (err) { status.innerText = 'Mic error'; isRecording = false; }
        }

        function stop() {
            if (!isRecording) return;
            isRecording = false;
            if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
            btn.classList.remove('recording');
            btn.innerText = 'Push to Talk';
            btn.setAttribute('aria-pressed', 'false');
        }

        ['mousedown', 'touchstart'].forEach(e => btn.addEventListener(e, (ev) => { ev.preventDefault(); start(); }));
        ['mouseup', 'mouseleave', 'touchend'].forEach(e => btn.addEventListener(e, stop));
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.repeat && !['INPUT', 'TEXTAREA'].includes(e.target.tagName) && !e.target.isContentEditable) {
                e.preventDefault(); start();
            }
        });
        window.addEventListener('keyup', (e) => { if (e.code === 'Space') stop(); });
    </script>
</body>
</html>
