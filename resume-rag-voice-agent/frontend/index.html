<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
            margin-top: 1rem;
            transition: background-color 0.2s ease, transform 0.1s ease;
            outline: 2px solid transparent;
            outline-offset: 2px;
        }
        button:focus-visible {
            outline-color: #007bff;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #007bff;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { margin-top: 1rem; color: #555; min-height: 1.5em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Click and hold to speak, release to send.</p>
        <button
            id="recordBtn"
            aria-label="Push to talk"
            aria-pressed="false"
        >Push to Talk</button>
        <div id="status" aria-live="polite">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let mediaRecorder;
        let audioChunks = [];
        let socket;

        // Initialize WebSocket
        function initWebSocket() {
            socket = new WebSocket('ws://localhost:8000/voice');
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => status.innerText = 'Connected to server';
            socket.onclose = () => {
                status.innerText = 'Disconnected. Retrying...';
                setTimeout(initWebSocket, 2000);
            };

            socket.onmessage = (event) => {
                const blob = new Blob([event.data], { type: 'audio/mp3' });
                const url = URL.createObjectURL(blob);
                audioPlayer.src = url;
                audioPlayer.style.display = 'block';
                audioPlayer.play();
                status.innerText = 'Playing response...';
            };
        }

        initWebSocket();

        // Recording logic
        let isRecording = false;
        let activeStream = null;

        async function startRecording() {
            if (isRecording) return;
            isRecording = true;
            audioChunks = [];

            try {
                activeStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(activeStream);

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioBlob.arrayBuffer().then(buffer => {
                        if (socket && socket.readyState === WebSocket.OPEN) {
                            socket.send(buffer);
                            status.innerText = 'Sent audio, waiting for response...';
                        }
                    });

                    if (activeStream) {
                        activeStream.getTracks().forEach(track => track.stop());
                        activeStream = null;
                    }
                };

                mediaRecorder.start();
                status.innerText = 'Recording...';
                recordBtn.style.backgroundColor = '#dc3545';
                recordBtn.setAttribute('aria-pressed', 'true');
                recordBtn.setAttribute('aria-label', 'Recording... Release to send');
            } catch (err) {
                console.error("Error accessing microphone:", err);
                status.innerText = 'Error: Could not access microphone';
                isRecording = false;
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            recordBtn.style.backgroundColor = '#007bff';
            recordBtn.setAttribute('aria-pressed', 'false');
            recordBtn.setAttribute('aria-label', 'Push to talk');
        }

        // Mouse events
        recordBtn.addEventListener('mousedown', startRecording);
        recordBtn.addEventListener('mouseup', stopRecording);
        recordBtn.addEventListener('mouseleave', stopRecording);

        // Touch events
        recordBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startRecording();
        });
        recordBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopRecording();
        });

        // Keyboard events
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isRecording) {
                const target = e.target;
                if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA' && !target.isContentEditable) {
                    e.preventDefault();
                    startRecording();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && isRecording) {
                e.preventDefault();
                stopRecording();
            }
        });
    </script>
</body>
</html>
