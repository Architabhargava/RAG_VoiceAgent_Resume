<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background-color: #007bff; color: white; margin-top: 1rem; transition: all 0.2s ease; }
        button:active { transform: scale(0.98); }
        button.recording { background-color: #dc3545; }
        button:disabled { background-color: #ccc; }
        #status { margin-top: 1rem; color: #555; min-height: 1.5em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Click and hold to speak, release to send.</p>
        <button id="recordBtn" aria-pressed="false">Push to Talk</button>
        <div id="status" aria-live="polite">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let mediaRecorder;
        let audioChunks = [];
        let socket;
        let isRecording = false;

        // Initialize WebSocket
        function initWebSocket() {
            // Check for file protocol to allow local UI testing
            const wsUrl = window.location.protocol === 'file:' ? 'ws://localhost:8000/voice' : `ws://${window.location.host}/voice`;
            socket = new WebSocket(wsUrl);
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => status.textContent = 'Connected to server';
            socket.onclose = () => {
                status.textContent = 'Disconnected. Retrying...';
                setTimeout(initWebSocket, 2000);
            };

            socket.onmessage = (event) => {
                const blob = new Blob([event.data], { type: 'audio/mp3' });
                const url = URL.createObjectURL(blob);
                if (audioPlayer.src) URL.revokeObjectURL(audioPlayer.src);
                audioPlayer.src = url;
                audioPlayer.style.display = 'block';
                audioPlayer.play();
                status.textContent = 'Playing response...';
            };
        }

        initWebSocket();

        async function startRecording() {
            if (isRecording) return;
            isRecording = true;
            audioChunks = [];

            // Update UI immediately
            status.textContent = 'Requesting microphone...';
            recordBtn.classList.add('recording');
            recordBtn.textContent = 'Release to Send';
            recordBtn.setAttribute('aria-pressed', 'true');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                // Hot mic check: user might have released during permission prompt
                if (!isRecording) {
                    stream.getTracks().forEach(track => track.stop());
                    return;
                }

                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    stream.getTracks().forEach(track => track.stop());
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioBlob.arrayBuffer().then(buffer => {
                        if (socket.readyState === WebSocket.OPEN) {
                            socket.send(buffer);
                            status.textContent = 'Sent audio, waiting for response...';
                        } else {
                            status.textContent = 'Error: Connection lost';
                        }
                    });
                };

                mediaRecorder.start();
                status.textContent = 'Recording...';
            } catch (err) {
                console.error('Error accessing microphone:', err);
                status.textContent = 'Microphone error';
                stopRecording();
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;

            recordBtn.classList.remove('recording');
            recordBtn.textContent = 'Push to Talk';
            recordBtn.setAttribute('aria-pressed', 'false');

            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }

        // Event listeners
        recordBtn.addEventListener('mousedown', (e) => {
            if (e.button === 0) startRecording();
        });
        window.addEventListener('mouseup', stopRecording);
        recordBtn.addEventListener('mouseleave', stopRecording);

        // Touch support
        recordBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startRecording();
        }, { passive: false });
        recordBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopRecording();
        }, { passive: false });

        // Keyboard support
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isRecording &&
                !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName) &&
                !document.activeElement.isContentEditable) {
                e.preventDefault();
                startRecording();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                stopRecording();
            }
        });
    </script>
</body>
</html>
