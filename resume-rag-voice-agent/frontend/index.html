<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
            margin-top: 1rem;
            transition: all 0.2s ease;
            outline: none;
        }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        button:focus-visible {
            box-shadow: 0 0 0 2px white, 0 0 0 4px #007bff;
        }
        button:active {
            transform: scale(0.98);
        }
        #recordBtn.recording {
            background-color: #dc3545;
        }
        #status { margin-top: 1rem; color: #555; min-height: 1.5em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Click and hold to speak, release to send.</p>
        <button id="recordBtn" aria-pressed="false">Push to Talk</button>
        <div id="status" aria-live="polite">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let mediaRecorder;
        let audioChunks = [];
        let socket;

        let isRecording = false;

        // Initialize WebSocket
        function initWebSocket() {
            // Support both local development and deployment
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.host || 'localhost:8000';
            socket = new WebSocket(`${protocol}//${host}/voice`);
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => status.textContent = 'Connected to server';
            socket.onclose = () => {
                status.textContent = 'Disconnected. Retrying...';
                setTimeout(initWebSocket, 2000);
            };

            socket.onmessage = (event) => {
                const blob = new Blob([event.data], { type: 'audio/mp3' });
                const url = URL.createObjectURL(blob);

                // Resource management: revoke old URL
                if (audioPlayer.src) {
                    URL.revokeObjectURL(audioPlayer.src);
                }

                audioPlayer.src = url;
                audioPlayer.style.display = 'block';
                audioPlayer.play();
                status.textContent = 'Playing response...';
            };
        }

        initWebSocket();

        // Recording logic
        const startRecording = async () => {
            if (isRecording) return;
            isRecording = true;
            audioChunks = [];

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioBlob.arrayBuffer().then(buffer => {
                        if (socket.readyState === WebSocket.OPEN) {
                            socket.send(buffer);
                            status.textContent = 'Sent audio, waiting for response...';
                        }
                    });
                    // Stop all tracks to release the microphone
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                status.textContent = 'Recording...';
                recordBtn.classList.add('recording');
                recordBtn.setAttribute('aria-pressed', 'true');
                recordBtn.textContent = 'Release to Send';
            } catch (err) {
                console.error('Error accessing microphone:', err);
                status.textContent = 'Error: Could not access microphone';
                isRecording = false;
            }
        };

        const stopRecording = () => {
            if (!isRecording) return;
            isRecording = false;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            recordBtn.classList.remove('recording');
            recordBtn.setAttribute('aria-pressed', 'false');
            recordBtn.textContent = 'Push to Talk';
        };

        // Event Listeners
        recordBtn.onmousedown = (e) => { e.preventDefault(); startRecording(); };
        recordBtn.onmouseup = (e) => { e.preventDefault(); stopRecording(); };

        // Touch support
        recordBtn.ontouchstart = (e) => { e.preventDefault(); startRecording(); };
        recordBtn.ontouchend = (e) => { e.preventDefault(); stopRecording(); };

        // Keyboard support (Space bar)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.repeat) {
                if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName) || document.activeElement.isContentEditable) {
                    return;
                }
                e.preventDefault();
                startRecording();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                stopRecording();
            }
        });

        // Global mouseup to ensure recording stops if mouse is released outside button
        window.addEventListener('mouseup', () => {
            if (isRecording) stopRecording();
        });
    </script>
</body>
</html>
