<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background-color: #007bff; color: white; margin-top: 1rem; }
        button:disabled { background-color: #ccc; }
        button:focus-visible { outline: 2px solid #0056b3; outline-offset: 2px; }
        #recordBtn.recording { background-color: #dc3545; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }
        #status { margin-top: 1rem; color: #555; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Click and hold to speak, release to send.</p>
        <button id="recordBtn" aria-pressed="false">Push to Talk</button>
        <div id="status" aria-live="polite">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let mediaRecorder;
        let audioChunks = [];
        let socket;

        // Initialize WebSocket
        function initWebSocket() {
            socket = new WebSocket('ws://localhost:8000/voice');
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => status.innerText = 'Connected to server';
            socket.onclose = () => {
                status.innerText = 'Disconnected. Retrying...';
                setTimeout(initWebSocket, 2000);
            };

            socket.onmessage = (event) => {
                const blob = new Blob([event.data], { type: 'audio/mp3' });
                const url = URL.createObjectURL(blob);
                audioPlayer.src = url;
                audioPlayer.style.display = 'block';
                audioPlayer.play();
                status.innerText = 'Playing response...';
            };
        }

        initWebSocket();

        // Recording logic
        const startRecording = async () => {
            if (recordBtn.classList.contains('recording')) return;

            try {
                audioChunks = [];
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioBlob.arrayBuffer().then(buffer => {
                        socket.send(buffer);
                        status.innerText = 'Sent audio, waiting for response...';
                    });
                };

                mediaRecorder.start();
                status.innerText = 'Recording...';
                recordBtn.classList.add('recording');
                recordBtn.setAttribute('aria-pressed', 'true');
                recordBtn.textContent = 'Release to Send';
            } catch (err) {
                console.error('Error accessing microphone:', err);
                status.innerText = 'Error: Could not access microphone';
            }
        };

        const stopRecording = () => {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                recordBtn.classList.remove('recording');
                recordBtn.setAttribute('aria-pressed', 'false');
                recordBtn.textContent = 'Push to Talk';
            }
        };

        recordBtn.onpointerdown = (e) => {
            e.preventDefault();
            startRecording();
        };

        window.onpointerup = () => {
            stopRecording();
        };

        window.onkeydown = (e) => {
            if (e.code === 'Space' && !e.repeat) {
                const target = e.target;
                if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA' && !target.isContentEditable) {
                    e.preventDefault();
                    startRecording();
                }
            }
        };

        window.onkeyup = (e) => {
            if (e.code === 'Space') {
                stopRecording();
            }
        };
    </script>
</body>
</html>
