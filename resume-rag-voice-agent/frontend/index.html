<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background-color: #007bff; color: white; margin-top: 1rem; transition: all 0.2s ease; }
        button:hover { background-color: #0056b3; }
        button:active { transform: scale(0.98); }
        button:focus-visible { outline: none; box-shadow: 0 0 0 2px white, 0 0 0 4px #007bff; }
        button.recording { background-color: #dc3545; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { margin-top: 1rem; color: #555; min-height: 1.5em; }
        kbd { background-color: #eee; border-radius: 3px; border: 1px solid #b4b4b4; box-shadow: 0 1px 1px rgba(0,0,0,0.2); color: #333; display: inline-block; font-size: 0.85em; font-weight: 700; line-height: 1; padding: 2px 4px; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Hold <kbd>Space</kbd> or click to speak, release to send.</p>
        <button id="recordBtn" aria-pressed="false">Push to Talk</button>
        <div id="status" aria-live="polite">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let mediaRecorder;
        let audioChunks = [];
        let socket;
        let isRecordingIntent = false;

        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.host || 'localhost:8000';
            socket = new WebSocket(`${protocol}//${host}/voice`);
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => status.textContent = 'Connected to server';
            socket.onclose = () => {
                status.textContent = 'Disconnected. Retrying...';
                setTimeout(initWebSocket, 2000);
            };

            socket.onmessage = (event) => {
                const blob = new Blob([event.data], { type: 'audio/mp3' });
                const url = URL.createObjectURL(blob);
                audioPlayer.src = url;
                audioPlayer.style.display = 'block';
                audioPlayer.play().catch(e => console.error("Playback failed", e));
                status.textContent = 'Playing response...';
            };
        }

        initWebSocket();

        async function startRecording() {
            if (isRecordingIntent) return;
            isRecordingIntent = true;
            audioChunks = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                if (!isRecordingIntent) {
                    stream.getTracks().forEach(t => t.stop());
                    return;
                }
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioBlob.arrayBuffer().then(buffer => {
                        if (socket.readyState === WebSocket.OPEN) {
                            socket.send(buffer);
                            status.textContent = 'Processing audio...';
                        }
                    });
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
                status.textContent = 'Recording...';
                recordBtn.classList.add('recording');
                recordBtn.setAttribute('aria-pressed', 'true');
                recordBtn.textContent = 'Release to Send';
            } catch (err) {
                console.error("Mic access denied", err);
                status.textContent = 'Microphone access denied';
                isRecordingIntent = false;
            }
        }

        function stopRecording() {
            if (!isRecordingIntent) return;
            isRecordingIntent = false;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            recordBtn.classList.remove('recording');
            recordBtn.setAttribute('aria-pressed', 'false');
            recordBtn.textContent = 'Push to Talk';
        }

        recordBtn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            startRecording();
        });

        window.addEventListener('pointerup', stopRecording);

        window.addEventListener('keydown', (e) => {
            const isInput = e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable;
            if (e.code === 'Space' && !e.repeat && !isInput) {
                e.preventDefault();
                startRecording();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                stopRecording();
            }
        });
    </script>
</body>
</html>
