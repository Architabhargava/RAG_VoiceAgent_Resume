<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background-color: #007bff; color: white; margin-top: 1rem; }
        button:disabled { background-color: #ccc; }
        button:focus-visible { outline: 2px solid #007bff; outline-offset: 2px; }
        #status { margin-top: 1rem; color: #555; min-height: 1.5em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Click and hold to speak, or press and hold Space, then release to send.</p>
        <button id="recordBtn" aria-pressed="false">Push to Talk</button>
        <div id="status" aria-live="polite">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let mediaRecorder;
        let audioChunks = [];
        let socket;
        let isRecording = false;

        // Initialize WebSocket
        function initWebSocket() {
            socket = new WebSocket('ws://localhost:8000/voice');
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => status.textContent = 'Connected to server';
            socket.onclose = () => {
                status.textContent = 'Disconnected. Retrying...';
                setTimeout(initWebSocket, 2000);
            };

            socket.onmessage = (event) => {
                if (audioPlayer.src) {
                    URL.revokeObjectURL(audioPlayer.src);
                }
                const blob = new Blob([event.data], { type: 'audio/mp3' });
                const url = URL.createObjectURL(blob);
                audioPlayer.src = url;
                audioPlayer.style.display = 'block';
                audioPlayer.play();
                status.textContent = 'Playing response...';
            };
        }

        initWebSocket();

        // Recording logic
        const startRecording = async () => {
            if (isRecording) return;
            isRecording = true;
            audioChunks = [];

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                // Safety check: if user released button while waiting for permission
                if (!isRecording) {
                    stream.getTracks().forEach(track => track.stop());
                    return;
                }

                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    stream.getTracks().forEach(track => track.stop());
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioBlob.arrayBuffer().then(buffer => {
                        if (socket.readyState === WebSocket.OPEN) {
                            socket.send(buffer);
                            status.textContent = 'Sent audio, waiting for response...';
                        } else {
                            status.textContent = 'Error: Connection lost';
                        }
                    });
                };

                mediaRecorder.start();
                status.textContent = 'Recording...';
                recordBtn.style.backgroundColor = '#dc3545';
                recordBtn.textContent = 'Release to Send';
                recordBtn.setAttribute('aria-pressed', 'true');
            } catch (err) {
                console.error('Error accessing microphone:', err);
                status.textContent = 'Error: Could not access microphone';
                isRecording = false;
            }
        };

        const stopRecording = () => {
            if (!isRecording) return;
            isRecording = false;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            recordBtn.style.backgroundColor = '#007bff';
            recordBtn.textContent = 'Push to Talk';
            recordBtn.setAttribute('aria-pressed', 'false');
        };

        // Event Listeners
        recordBtn.addEventListener('mousedown', (e) => {
            if (e.button === 0) startRecording();
        });
        window.addEventListener('mouseup', stopRecording);

        recordBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startRecording();
        }, { passive: false });
        recordBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopRecording();
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isRecording && !e.repeat) {
                const target = e.target;
                if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA' && !target.isContentEditable) {
                    e.preventDefault();
                    startRecording();
                }
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                stopRecording();
            }
        });

        recordBtn.addEventListener('mouseleave', () => {
            if (isRecording) stopRecording();
        });
    </script>
</body>
</html>
