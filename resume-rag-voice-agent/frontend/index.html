<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; background-color: #007bff; color: white; margin-top: 1rem; transition: all 0.2s ease; }
        button:hover { background-color: #0056b3; }
        button:active { transform: scale(0.98); }
        button:focus-visible { outline: 2px solid #0056b3; outline-offset: 2px; }
        #recordBtn.recording { background-color: #dc3545; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { margin-top: 1rem; color: #555; min-height: 1.5em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Click and hold to speak, release to send.</p>
        <button id="recordBtn" aria-pressed="false">Push to Talk</button>
        <div id="status" aria-live="polite">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let mediaRecorder;
        let audioChunks = [];
        let socket;
        let isRecording = false;
        let recordingIntent = false;

        // Initialize WebSocket
        function initWebSocket() {
            socket = new WebSocket('ws://localhost:8000/voice');
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => status.innerText = 'Connected to server';
            socket.onclose = () => {
                status.innerText = 'Disconnected. Retrying...';
                setTimeout(initWebSocket, 2000);
            };

            socket.onmessage = (event) => {
                const blob = new Blob([event.data], { type: 'audio/mp3' });
                const url = URL.createObjectURL(blob);
                audioPlayer.src = url;
                audioPlayer.style.display = 'block';
                audioPlayer.play();
                status.innerText = 'Playing response...';
            };
        }

        initWebSocket();

        // Recording logic
        async function startRecording(e) {
            if (e) e.preventDefault();
            if (recordingIntent) return;
            recordingIntent = true;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                // Re-verify intent after permission granted
                if (!recordingIntent) {
                    stream.getTracks().forEach(track => track.stop());
                    return;
                }

                isRecording = true;
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioBlob.arrayBuffer().then(buffer => {
                        if (socket.readyState === WebSocket.OPEN) {
                            socket.send(buffer);
                            status.textContent = 'Sent audio, waiting for response...';
                        }
                    });
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                status.textContent = 'Recording...';
                recordBtn.classList.add('recording');
                recordBtn.textContent = 'Release to Send';
                recordBtn.setAttribute('aria-pressed', 'true');
            } catch (err) {
                console.error("Microphone access denied:", err);
                status.textContent = 'Error: Microphone access denied';
                recordingIntent = false;
            }
        }

        function stopRecording(e) {
            if (e) e.preventDefault();
            recordingIntent = false;
            if (!isRecording) return;

            isRecording = false;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            recordBtn.classList.remove('recording');
            recordBtn.textContent = 'Push to Talk';
            recordBtn.setAttribute('aria-pressed', 'false');
        }

        recordBtn.addEventListener('mousedown', startRecording);
        recordBtn.addEventListener('mouseup', stopRecording);
        recordBtn.addEventListener('mouseleave', stopRecording);

        // Touch support for mobile
        recordBtn.addEventListener('touchstart', startRecording);
        recordBtn.addEventListener('touchend', stopRecording);

        // Keyboard support (Space bar)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.repeat) {
                // Only trigger if not typing in an input
                const target = e.target;
                if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA' && !target.isContentEditable) {
                    startRecording(e);
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                stopRecording(e);
            }
        });
    </script>
</body>
</html>
