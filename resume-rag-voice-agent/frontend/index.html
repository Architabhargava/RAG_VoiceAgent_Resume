<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Voice Agent</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
            margin-top: 1rem;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        button:focus { outline: none; }
        button:focus-visible { outline: 3px solid #0056b3; outline-offset: 2px; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        button.recording { background-color: #dc3545; }
        #status { margin-top: 1rem; color: #555; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Voice Agent</h1>
        <p>Click and hold to speak, or press and hold Space bar.</p>
        <button id="recordBtn" aria-label="Push to Talk" aria-pressed="false">Push to Talk</button>
        <div id="status" aria-live="polite">Ready</div>
        <audio id="audioPlayer" controls style="display:none;"></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];
        let socket;

        // Initialize WebSocket
        function initWebSocket() {
            socket = new WebSocket('ws://localhost:8000/voice');
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => status.innerText = 'Connected to server';
            socket.onclose = () => {
                status.innerText = 'Disconnected. Retrying...';
                setTimeout(initWebSocket, 2000);
            };

            socket.onmessage = (event) => {
                const blob = new Blob([event.data], { type: 'audio/mp3' });
                const url = URL.createObjectURL(blob);
                audioPlayer.src = url;
                audioPlayer.style.display = 'block';
                audioPlayer.play();
                status.innerText = 'Playing response...';
            };
        }

        initWebSocket();

        // Recording logic functions
        async function startRecording() {
            if (isRecording) return;
            isRecording = true;
            audioChunks = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                // Check if user stopped while waiting for mic permission
                if (!isRecording) {
                    stream.getTracks().forEach(track => track.stop());
                    return;
                }

                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioBlob.arrayBuffer().then(buffer => {
                        if (socket && socket.readyState === WebSocket.OPEN) {
                            socket.send(buffer);
                            status.innerText = 'Sent audio, waiting for response...';
                        }
                    });
                    // Stop all tracks to release the microphone
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                status.innerText = 'Recording...';
                recordBtn.classList.add('recording');
                recordBtn.setAttribute('aria-pressed', 'true');
            } catch (err) {
                console.error('Error accessing microphone:', err);
                status.innerText = 'Error: Microphone access denied';
                isRecording = false;
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            recordBtn.classList.remove('recording');
            recordBtn.setAttribute('aria-pressed', 'false');
        }

        // Event Listeners
        recordBtn.addEventListener('mousedown', startRecording);
        recordBtn.addEventListener('mouseup', stopRecording);
        recordBtn.addEventListener('mouseleave', stopRecording);

        // Keyboard Support
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.repeat) {
                const target = e.target;
                if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA' && !target.isContentEditable) {
                    e.preventDefault();
                    startRecording();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                stopRecording();
            }
        });
    </script>
</body>
</html>
